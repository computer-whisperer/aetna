<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360">
<defs>
  <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
    <feOffset dx="0" dy="2"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.20"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow-md" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
    <feOffset dx="0" dy="6"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow-lg" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
    <feOffset dx="0" dy="12"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#0e1016"/>
<text data-node="root.heading.0" data-shader="stock::text_sdf" x="28.00" y="52.18" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26.00" font-weight="700" fill="#e8eef6" text-anchor="start">Custom shader demo</text>
<text data-node="root.text.1" data-shader="stock::text_sdf" x="28.00" y="95.42" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14.00" font-weight="400" fill="#94a0b0" text-anchor="start">Three buttons below paint via a registered custom shader (gradient.wgsl). The right-hand button is a stock rounded_rect for contrast.</text>
<rect data-node="root.card.2" data-shader="stock::rounded_rect" x="28.00" y="120.00" width="664.00" height="106.40" rx="12.00" fill="#171a21" stroke="#323a48" stroke-width="1.00" filter="url(#shadow-md)" />
<text data-node="root.card.2.heading.0" data-shader="stock::text_sdf" x="46.00" y="152.88" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16.00" font-weight="600" fill="#e8eef6" text-anchor="start">gradient.wgsl — vertical linear gradient</text>
<g data-node="root.card.2.group.1.button.0" data-shader="custom::gradient"><title>custom shader: gradient vec_a=rgba(255,200,90,255) vec_b=rgba(245,95,110,255) vec_c=8.00</title><rect x="46.00" y="172.40" width="82.80" height="36.00" fill="rgba(255,0,255,0.18)" stroke="rgba(255,0,255,0.5)" stroke-width="1" stroke-dasharray="3 2" /></g>
<text data-node="root.card.2.group.1.button.0" data-shader="stock::text_sdf" x="87.40" y="193.62" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14.00" font-weight="500" fill="#081019" text-anchor="middle">Sunrise</text>
<g data-node="root.card.2.group.1.button.1" data-shader="custom::gradient"><title>custom shader: gradient vec_a=rgba(120,200,255,255) vec_b=rgba(40,90,200,255) vec_c=8.00</title><rect x="140.80" y="172.40" width="66.00" height="36.00" fill="rgba(255,0,255,0.18)" stroke="rgba(255,0,255,0.5)" stroke-width="1" stroke-dasharray="3 2" /></g>
<text data-node="root.card.2.group.1.button.1" data-shader="stock::text_sdf" x="173.80" y="193.62" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14.00" font-weight="500" fill="#081019" text-anchor="middle">Ocean</text>
<g data-node="root.card.2.group.1.button.2" data-shader="custom::gradient"><title>custom shader: gradient vec_a=rgba(180,230,140,255) vec_b=rgba(40,110,80,255) vec_c=8.00</title><rect x="218.80" y="172.40" width="74.40" height="36.00" fill="rgba(255,0,255,0.18)" stroke="rgba(255,0,255,0.5)" stroke-width="1" stroke-dasharray="3 2" /></g>
<text data-node="root.card.2.group.1.button.2" data-shader="stock::text_sdf" x="256.00" y="193.62" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14.00" font-weight="500" fill="#081019" text-anchor="middle">Forest</text>
<rect data-node="root.card.2.group.1.button.4" data-shader="stock::rounded_rect" x="608.00" y="172.40" width="66.00" height="36.00" rx="8.00" fill="#20242d" stroke="#323a48" stroke-width="1.00" />
<text data-node="root.card.2.group.1.button.4" data-shader="stock::text_sdf" x="641.00" y="193.62" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14.00" font-weight="500" fill="#e8eef6" text-anchor="middle">Stock</text>
</svg>
