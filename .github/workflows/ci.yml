name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt (live crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # `attempts/*` is a frozen historical archive that does not follow
      # the new rustfmt standard. Limit the gate to the live crates.
      - run: cargo fmt -p aetna-core -p aetna-wgpu -p aetna-demo -p aetna-web -p aetna-vulkano -p aetna-vulkano-demo --check

  clippy:
    name: Clippy (live crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p aetna-core -p aetna-wgpu -p aetna-demo -p aetna-web -p aetna-vulkano -p aetna-vulkano-demo --all-targets --locked -- -D warnings

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      # wgpu/winit need vulkan + wayland/xkb + dbus on Linux. Same set as
      # whisper-git's CI.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

      - name: Run library tests
        run: cargo test --workspace --lib --locked

  wasm32:
    name: Wasm32 (aetna-web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # aetna-web's wasm host code lives behind `#[cfg(target_arch = "wasm32")]`,
      # so it does not get exercised by the native build/clippy jobs above.
      # Catch wgpu / winit / wasm-bindgen API drift here before it lands.
      - run: cargo clippy -p aetna-web --target wasm32-unknown-unknown --locked -- -D warnings
