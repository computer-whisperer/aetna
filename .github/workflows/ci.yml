name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt (live crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (live crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # wgpu/winit need vulkan + wayland/xkb + dbus on Linux. Same set as
      # whisper-git's CI.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

      - name: Run library tests
        run: cargo test --workspace --lib --locked

      - name: Build showcase bundles and lint
        run: cargo run -p aetna-tools --bin dump_showcase_bundles --locked

  wasm32:
    name: Wasm32 (web host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # aetna-web's wasm host code lives behind `#[cfg(target_arch = "wasm32")]`,
      # so it does not get exercised by the native build/clippy jobs above.
      # Catch wgpu / winit / wasm-bindgen API drift here before it lands.
      - run: cargo clippy -p aetna-web --target wasm32-unknown-unknown --locked -- -D warnings
      - run: cargo clippy -p aetna-web-showcase --target wasm32-unknown-unknown --locked -- -D warnings
