[package]
name = "aetna-web"
version = "0.1.0"
edition = "2024"
description = "Aetna — wasm browser entry point + shared App impl, with a native binary for parity"
license = "MIT OR Apache-2.0"

[lib]
# `cdylib` is what `wasm-pack build --target web` ships to the browser;
# `rlib` lets the sibling native binary import the same `App` impl.
# This is the standard "one UI crate, two backends" split — same shape
# as whisper-agent-webui at ../../whisper-agent.
crate-type = ["cdylib", "rlib"]

[dependencies]
aetna-core = { path = "../aetna-core" }
aetna-wgpu = { path = "../aetna-wgpu" }
# `aetna-demo` is the home of the shared `Showcase` App impl; depending
# on it from both native and wasm gives us one type that drives both
# targets. `aetna_demo::run` (the native winit runner) is the canonical
# native entry; the wasm path here uses its own browser-tailored
# event loop below.
aetna-demo = { path = "../aetna-demo" }
wgpu = "29"
winit = "0.30"

[target.'cfg(target_arch = "wasm32")'.dependencies]
# wasm-bindgen is the FFI bridge wasm-pack consumes.
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
console_log = "1"
log = "0.4"
js-sys = "0.3"
# `web_time::Instant` is a wasm-safe shim for `std::time::Instant`
# (the std one panics on wasm32). Used here for the per-frame
# timing breakdown.
web-time = "1"
web-sys = { version = "0.3", features = [
    "Document",
    "Element",
    "HtmlCanvasElement",
    "Window",
] }
# Browser wgpu backends — workspace's plain `wgpu = "29"` only enables
# native backends.
wgpu = { version = "29", features = ["webgl"] }
