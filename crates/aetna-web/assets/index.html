<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aetna — Counter (browser)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #1c1c1c;
            font-family: system-ui, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>
    <!-- aetna-web's wasm entry looks for #aetna_canvas at startup. Mounting
         the canvas here keeps the host page minimal — pages that embed
         the wasm bundle elsewhere just need to include a canvas with the
         same id. -->
    <canvas id="aetna_canvas"></canvas>
    <script type="module">
        import init from '/pkg/aetna_web.js';
        init().catch(err => {
            console.error('failed to start aetna-web:', err);
            document.body.innerHTML =
                '<pre style="color:#fff;padding:1em;">aetna-web failed to start. ' +
                'Did you run `tools/build_web.sh`?\n\n' + String(err) + '</pre>';
        });
    </script>
</body>
</html>
