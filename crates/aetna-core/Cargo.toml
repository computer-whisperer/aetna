[package]
name = "aetna-core"
version = "0.1.0"
edition = "2024"
description = "Aetna — backend-agnostic UI library core"
license = "MIT OR Apache-2.0"

[lib]
path = "src/lib.rs"

[dependencies]
bytemuck = { version = "1", features = ["derive"] }
cosmic-text = "0.12.1"
swash = "0.1.19"
ttf-parser = "0.25.1"
# `Instant` that works on wasm32 (browser has no monotonic clock; std's
# Instant::now() panics). API-identical to std::time::Instant on native.
web-time = "1"

[[example]]
name = "settings"
path = "examples/settings.rs"
