[package]
name = "aetna-core"
version = "0.1.0"
edition = "2024"
description = "Aetna — backend-agnostic UI library core"
license = "MIT OR Apache-2.0"

[lib]
path = "src/lib.rs"

[dependencies]
aetna-fonts = { path = "../aetna-fonts", default-features = false }
bytemuck = { version = "1", features = ["derive"] }
cosmic-text = "0.12.1"
fdsm = "0.8"
fdsm-ttf-parser = "0.2"
image = { version = "0.25", default-features = false }
lyon_tessellation = "1.0.20"
nalgebra = { version = "0.34", default-features = false, features = ["std"] }
swash = "0.1.19"
ttf-parser = "0.25.1"
usvg = { version = "0.47.0", default-features = false }
# `Instant` that works on wasm32 (browser has no monotonic clock; std's
# Instant::now() panics). API-identical to std::time::Instant on native.
web-time = "1"

[features]
default = ["default_fonts"]
# Bundle aetna-fonts' default font set (Roboto + NotoColorEmoji +
# Symbols2 + Math) into the binary. Disable to ship your own fonts via
# `register_font`. The per-format features below are activated by
# `default_fonts` and can also be toggled individually:
# `aetna-core = { default-features = false, features = ["roboto"] }`.
default_fonts = ["roboto", "emoji", "symbols"]
roboto = ["aetna-fonts/roboto"]
emoji = ["aetna-fonts/emoji"]
symbols = ["aetna-fonts/symbols"]
cjk = ["aetna-fonts/cjk"]

[[example]]
name = "settings"
path = "examples/settings.rs"
