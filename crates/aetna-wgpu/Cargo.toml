[package]
name = "aetna-wgpu"
version = "0.1.0"
edition = "2024"
description = "Aetna — wgpu backend (native + wasm)"
license = "MIT OR Apache-2.0"

[lib]
path = "src/lib.rs"

[dependencies]
aetna-core = { path = "../aetna-core" }
wgpu = "23"
bytemuck = { version = "1.21", features = ["derive"] }
# Drop-in `Instant::now()` that works on wasm32; std's panics there.
web-time = "1"
